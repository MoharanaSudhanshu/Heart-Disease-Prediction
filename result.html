<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prediction Result</title>

<link rel="stylesheet" href="style.css">

<style>

.result-section{
    min-height:100vh;
    padding:120px 10%;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8fbff;
}

.result-card{
    max-width:700px;
    width:100%;
    background:white;
    border-radius:25px;
    padding:40px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.result-icon{
    font-size:90px;
    margin-bottom:20px;
}

.result-title{
    font-size:2rem;
    margin-bottom:15px;
}

.result-description{
    color:#666;
    line-height:1.8;
}

.meter{
    width:220px;
    height:220px;
    border-radius:50%;
    margin:30px auto;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:2rem;
    font-weight:bold;
    color:#222;
}

.low-risk{
    background:conic-gradient(
        #2ecc71 0deg,
        #2ecc71 90deg,
        #eee 90deg
    );
}

.high-risk{
    background:conic-gradient(
        #e63946 0deg,
        #e63946 270deg,
        #eee 270deg
    );
}

.meter-inner{
    width:160px;
    height:160px;
    background:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.suggestions{
    text-align:left;
    margin-top:30px;
}

.suggestions li{
    margin:10px 0;
}

.btn-group{
    margin-top:30px;
}

.btn-group a{
    margin:10px;
}

</style>

</head>

<body>

<section class="result-section">

<div class="result-card">

<div id="resultContent">

</div>

</div>

</section>

<script src="js/result.js"></script>

</body>
</html>
